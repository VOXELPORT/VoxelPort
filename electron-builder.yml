appId: com.voxelport.app
productName: "VoxelPort"
artifactName: "${productName}-${version}.${ext}"
directories:
  output: dist-electron
files:
  - src/**/*
  - dist/**/*
  - assets/**/*
  - package.json
win:
  target: nsis
  icon: assets/icon.ico
  requestedExecutionLevel: asInvoker
mac:
  target: dmg
linux:
  target: AppImage
  icon: assets/icon.png
publish:
  provider: github
